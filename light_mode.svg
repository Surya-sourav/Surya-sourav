<svg width="900" height="450" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="circleMask">
      <circle cx="140" cy="225" r="130"/>
    </clipPath>
  </defs>
  
  <rect width="900" height="450" fill="#ffffff"/>
  
  <!-- Header -->
  <text x="20" y="35" font-size="16" font-weight="bold" fill="#1a1a1a" font-family="'Courier New', monospace">
    surya@localhost ~ %
  </text>
  
  <!-- Divider -->
  <line x1="20" y1="50" x2="880" y2="50" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- LEFT: Profile Picture Container (Circular) -->
  <image x="20" y="70" width="260" height="360" href="" clip-path="url(#circleMask)" preserveAspectRatio="xMidYMid slice"/>
  <circle cx="140" cy="225" r="130" fill="none" stroke="#0066cc" stroke-width="2"/>
  
  <!-- RIGHT: Terminal Info (Side by side) -->
  <text x="310" y="90" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">os</tspan><tspan fill="#666666"> .............. Linux, macOS</tspan>
  </text>
  
  <text x="310" y="115" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">uptime</tspan><tspan fill="#666666"> ...... 22 years &amp; continuing</tspan>
  </text>
  
  <text x="310" y="140" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">host</tspan><tspan fill="#666666"> ............ LocalHost</tspan>
  </text>
  
  <text x="310" y="165" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">kernel</tspan><tspan fill="#666666"> ....... Any Kernel You Like</tspan>
  </text>
  
  <text x="310" y="190" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">ide</tspan><tspan fill="#666666"> .............. VS Code, IDEA</tspan>
  </text>
  
  <text x="310" y="215" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">languages</tspan><tspan fill="#666666"> .... TS, Go, Java, Python, C++</tspan>
  </text>
  
  <text x="310" y="240" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">software</tspan><tspan fill="#666666"> .... Low Level, Backends, AI</tspan>
  </text>
  
  <text x="310" y="265" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">hobbies</tspan><tspan fill="#666666"> .... Trekking, Traveling, Camping</tspan>
  </text>
  
  <text x="310" y="290" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">email</tspan><tspan fill="#666666"> ......... surya.aimlx@gmail.com</tspan>
  </text>
  
  <text x="310" y="315" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">commits</tspan><tspan fill="#666666"> ... Fetching from GitHub...</tspan>
  </text>
  
  <text x="310" y="340" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">repos</tspan><tspan fill="#666666"> ........ Fetching from GitHub...</tspan>
  </text>
  
  <text x="310" y="365" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">stars</tspan><tspan fill="#666666"> ........ Fetching from GitHub...</tspan>
  </text>
  
  <text x="310" y="390" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan font-weight="bold" fill="#0066cc">followers</tspan><tspan fill="#666666"> ... Fetching from GitHub...</tspan>
  </text>
  
  <text x="310" y="430" font-size="11" font-family="'Courier New', monospace" fill="#1a1a1a">
    <tspan fill="#666666">$ </tspan><tspan font-weight="bold" fill="#00cc00">cat ~/github-stats</tspan>
  </text>
</svg>