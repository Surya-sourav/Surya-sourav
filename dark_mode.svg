  </text>
  
  <text x="310" y="340" font-size="11" font-family="'Courier New', monospace" fill="#c9d1d9">
    <tspan font-weight="bold" fill="#58a6ff">repos</tspan><tspan fill="#8b949e"> ........ Fetching from GitHub...</tspan>
  </text>
  
  <text x="310" y="365" font-size="11" font-family="'Courier New', monospace" fill="#c9d1d9">
