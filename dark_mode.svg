    <tspan x="25" dy="8">++#@@#@@@@@@@#-:....#-</tspan>
    <tspan x="25" dy="8">++$+=-  .:::::==   ++</tspan>
    <tspan x="25" dy="8">-+#%+:+*@@@@@@@#%</tspan>
    <tspan x="25" dy="8">;;===:*%*@@@@@+</tspan>
