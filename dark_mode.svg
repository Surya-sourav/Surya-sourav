<svg width="900" height="450" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="circleMask">
      <circle cx="140" cy="225" r="130"/>
    </clipPath>
  </defs>
  
  <rect width="900" height="450" fill="#0d1117"/>
  
  <!-- Header -->
  <text x="20" y="35" font-size="16" font-weight="bold" fill="#c9d1d9" font-family="'Courier New', monospace">
    surya@localhost ~ %
  </text>
  
  <!-- Divider -->
  <line x1="20" y1="50" x2="880" y2="50" stroke="#30363d" stroke-width="1"/>
  
  <!-- LEFT: Profile Picture Container (Circular) -->
  <image x="20" y="70" width="260" height="360" href="" clip-path="url(#circleMask)" preserveAspectRatio="xMidYMid slice"/>
  <circle cx="140" cy="225" r="130" fill="none" stroke="#58a6ff" stroke-width="2"/>
  
  <!-- RIGHT: Terminal Info (Side by side) -->
  <text x="310" y="90" font-size="11" font-family="'Courier New', monospace" fill="#c9d1d9">
    <tspan font-weight="bold" fill="#58a6ff">os</tspan><tspan fill="#8b949e"> .............. Linux, macOS</tspan>
  </text>
  
